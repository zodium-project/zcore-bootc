# ================================================================
#  ppd-tuned — Power Profiles Daemon / TuneD bridge config
#  Zodium Project : github.com/zodium-project
# ================================================================

# ── Main ──────────────────────────────────────────────────────
[main]
# The default PPD profile
default=balanced
battery_detection=true
sysfs_acpi_monitor=true

# ── AC Profiles ───────────────────────────────────────────────
# PPD = TuneD
[profiles]
power-saver=zodium-powersave
balanced=zodium-balanced
performance=zodium-performance

# ── Battery Profiles ──────────────────────────────────────────
# PPD = TuneD
[battery]
power-saver=zodium-powersave
balanced=zodium-battery
performance=zodium-balanced