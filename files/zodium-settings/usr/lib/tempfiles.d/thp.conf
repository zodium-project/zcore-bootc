# Linux 6.12+ THP shrinker tuning for THP=always systems.
# Upstream default is 511 (very permissive).
# Lowering to 409 causes khugepaged to split THPs that are >80% empty
# (more than 409 of 512 base pages are none/zero-filled), reducing RAM waste
# and memory pressure while preserving most THP performance benefits.
w! /sys/kernel/mm/transparent_hugepage/khugepaged/max_ptes_none - - - - 409