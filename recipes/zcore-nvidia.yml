---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>

name: zcore-nvidia
description: zcore image for NVIDIA GPUs
base-image: quay.io/fedora/fedora-bootc
image-version: latest
platforms:
  - linux/amd64

modules:
## Import Modules/Scripts ##
  - from-file: zbuild/configure/pre-requisite.yml
#### => Core Packages / Tweaks to install.
  - from-file: zbuild/install/core/base.yml
  - from-file: zbuild/install/core/udevs.yml
  - from-file: zbuild/install/core/audio.yml
  - from-file: zbuild/install/core/camera.yml
  - from-file: zbuild/install/core/hardware.yml
  - from-file: zbuild/install/core/printers.yml
  - from-file: zbuild/install/core/connectivity.yml
#### => Nonfree Packages / Tweaks to install.
  - from-file: zbuild/install/nonfree/mesa.yml
  - from-file: zbuild/install/nonfree/kmods.yml
  - from-file: zbuild/install/nonfree/codecs.yml
  - from-file: zbuild/install/nonfree/nvidia-open.yml
#### => Extra Packages / Tweaks to install.
  - from-file: zbuild/install/extras/fonts.yml
  - from-file: zbuild/install/extras/devtools.yml
  - from-file: zbuild/install/extras/homebrew.yml
  - from-file: zbuild/install/extras/zcore-cli.yml
  - from-file: zbuild/install/extras/debug-utilities.yml
### => Removal Modules/Scripts
  - from-file: zbuild/uninstall/image-pkgs.yml
  - from-file: zbuild/uninstall/pulled-pkgs.yml
### => Post Install Configuration
  - from-file: zbuild/configure/zcore-settings.yml
  - from-file: zbuild/configure/post-requisite.yml
  - from-file: zbuild/configure/os-release.yml