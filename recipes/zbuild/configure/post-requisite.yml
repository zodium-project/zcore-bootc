---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
# - type: script
#   snippets:
#      - dnf remove -y kernel-devel kernel-headers gcc gcc-c++ make

 - type: script
   snippets:
      - dnf upgrade --refresh --setopt=install_weak_deps=False -y
      - dnf config-manager setopt fedora-multimedia.enabled=0
      - rm -f /etc/yum.repos.d/fedora-multimedia.repo
      - rm -f /etc/yum.repos.d/zodium-kmods.repo
      - rm -f /etc/yum.repos.d/zodium-pkgs.repo
      - dnf5 autoremove -y
      - dnf5 clean packages
      - dnf5 clean all