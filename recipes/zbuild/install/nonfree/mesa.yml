---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
 - type: dnf
   install:
     install-weak-deps: false
     packages:
      # => Mesa Drivers
      - mesa-libGL
      - mesa-libgbm
      - mesa-libEGL
      - mesa-filesystem
      - mesa-dri-drivers
      # => intel media drivers
      - intel-gmmlib
      - intel-vpl-gpu-rt
      - libva-intel-media-driver
      # => AMD media drivers
      - mesa-va-drivers
      - mesa-vulkan-drivers