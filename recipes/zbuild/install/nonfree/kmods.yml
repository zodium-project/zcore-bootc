---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:

 - type: dnf
   install:
     install-weak-deps: false
     packages:
    # => boardcom-wl
      - broadcom-wl
      - kmod-wl-"$(rpm -q kernel --queryformat '%{VERSION}-%{RELEASE}.%{ARCH}' | tail -1)"
    # => sc0710 (capture-card)
      - sc0710
      - kmod-sc0710-"$(rpm -q kernel --queryformat '%{VERSION}-%{RELEASE}.%{ARCH}' | tail -1)"
    # => xone
      - xone-kmod-common
      - kmod-xone-"$(rpm -q kernel --queryformat '%{VERSION}-%{RELEASE}.%{ARCH}' | tail -1)"
    # => xpadneo
      - xpadneo-kmod-common
      - kmod-xpadneo-"$(rpm -q kernel --queryformat '%{VERSION}-%{RELEASE}.%{ARCH}' | tail -1)"
    # => displaylink
      - libevdi
      - displaylink
      - kmod-evdi-"$(rpm -q kernel --queryformat '%{VERSION}-%{RELEASE}.%{ARCH}' | tail -1)"
    # => openrazer
      - openrazer-kmod-common
      - kmod-openrazer-"$(rpm -q kernel --queryformat '%{VERSION}-%{RELEASE}.%{ARCH}' | tail -1)"
    # => openZFS
      - zfs
      - libzfs7
      - libuutil3
      - libzpool7
      - zfs-dracut
      - libnvpair3
      - python3-pyzfs
      - kmod-zfs-"$(rpm -q kernel --queryformat '%{VERSION}-%{RELEASE}.%{ARCH}' | tail -1)"
    # => v4l2loopback
      - v4l2loopback
      - v4l2loopback-akmod-modules
      - kmod-v4l2loopback-"$(rpm -q kernel --queryformat '%{VERSION}-%{RELEASE}.%{ARCH}' | tail -1)"
    # => new-lg4ff (wheels)
      - new-lg4ff
      - new-lg4ff-akmod-modules
      - kmod-new-lg4ff-"$(rpm -q kernel --queryformat '%{VERSION}-%{RELEASE}.%{ARCH}' | tail -1)"
    # => hid-fanatecff (wheels)
      - hid-fanatecff
      - hid-fanatecff-akmod-modules
      - kmod-hid-fanatecff-"$(rpm -q kernel --queryformat '%{VERSION}-%{RELEASE}.%{ARCH}' | tail -1)"
    # => hid-tmff2 (wheels)
      - hid-tmff2
      - hid-tmff2-akmod-modules
      - kmod-hid-tmff2-"$(rpm -q kernel --queryformat '%{VERSION}-%{RELEASE}.%{ARCH}' | tail -1)"

 - type: script
   snippets:
      - depmod -a "$(rpm -q kernel --queryformat '%{VERSION}-%{RELEASE}.%{ARCH}' | tail -1)"