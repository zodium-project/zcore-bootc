---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: dnf
    install:
      install-weak-deps: false
      packages:
      # => gnu tools replacement
       - bat
       - eza
       - fzf
       - btop
       - zoxide
       - fd-find
       - ripgrep
       - starship
       - trash-cli
      # => Compilers & libraries
       - gcc
       - curl
       - zstd
       - gcc-c++
       - musl-gcc
       - musl-libc
       - musl-devel
       - glibc-devel
       - musl-filesystem
       - musl-libc-static
      # => text-editors
       - code
       - neovim
      # => zutils
       - zrun
       - zgpu
       - zync
       - zfetch
      #=> git & git-extras
       - git
       - git-lfs
       - git-annex
       - git-delta
      #=> podman (containers)
       - crun
       - podman
       - podman-compose
      #=> android (containers)
       - waydroid
      #=> docker-ce (containers)
       - docker-ce
       - docker-ce-cli
       - containerd.io
       - docker-buildx-plugin
       - docker-compose-plugin

  - type: script
    snippets:
      - |
        systemctl enable docker.service
        systemctl enable containerd.service