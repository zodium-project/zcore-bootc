---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: script
    scripts:
      - pkgs/docker-ce.sh
      - pkgs/udevs.sh 
      - pkgs/zcore-cli.sh

  - type: dnf
    install:
       install-weak-deps: false
       packages:
         #=> git & git-extras
         - git
         - git-lfs
         - git-annex
         - git-delta
         #=> Zsh Shell
         - zsh
         - zsh-autosuggestions
         - zsh-syntax-highlighting
         #=> Plymouth
         - plymouth
         - plymouth-plugin-two-step
         #=> Containers
         - waydroid
         - podman
         - podman-compose
         - crun