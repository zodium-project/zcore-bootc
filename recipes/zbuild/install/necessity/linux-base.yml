---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
 - type: dnf
   install:
     install-weak-deps: false
     packages:
    # => Kernel Modules
      - linux-firmware
      - kernel-tools-libs
      - kernel-modules-extra
    # => Init & Defaults
      - systemd-oomd-defaults
      - uresourced
      - dbus-daemon
      - unbound-anchor
      - zram-generator
      - vulkan-tools
      - usb_modeswitch
    # => User Apps
      - flatpak
      - mangohud
    # => TPM2.0 Support
      - tpm2-tools
    # => fuse (Appimage & winboat)
      - fuse
      - fuse-libs
      - freerdp