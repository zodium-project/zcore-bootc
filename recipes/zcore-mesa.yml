---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>

####################
#### Image Info ####
####################
name: zcore-mesa
description: zcore image for AMD/Intel GPUs
base-image: quay.io/fedora/fedora-bootc
image-version: latest
platforms:
  - linux/amd64
#################
#### MODULES ####
#################
modules:
## Import Modules/Scripts ##
### => Installation Modules/Scripts
#### => Core Packages / Tweaks to install.
  - from-file: zrun/add/core/linux-stack.yml
  - from-file: zrun/add/core/firmwares.yml
  - from-file: zrun/add/core/wifi-lan.yml
  - from-file: zrun/add/core/network-tools.yml
  - from-file: zrun/add/core/bluetooth.yml
  - from-file: zrun/add/core/libcamera.yml
  - from-file: zrun/add/core/cups.yml
#### => Extra Packages / Tweaks to install.
  - from-file: zrun/add/extra/repos-extra.yml
  - from-file: zrun/add/extra/vpn.yml
  - from-file: zrun/add/extra/zcore-cli.yml
  - from-file: zrun/add/extra/dev-tools.yml
  - from-file: zrun/add/extra/homebrew.yml
  - from-file: zrun/add/extra/plymouth.yml
  - from-file: zrun/add/extra/zsh-shell.yml
  - from-file: zrun/add/extra/langpacks.yml
  - from-file: zrun/add/extra/fonts.yml
#### => Nonfree Packages / Tweaks to install.
  - from-file: zrun/add/nonfree/repos-nonfree.yml
  - from-file: zrun/add/nonfree/codecs.yml
  - from-file: zrun/add/nonfree/pipewire.yml
  - from-file: zrun/add/nonfree/mesa-freeworld.yml
### => Removal Modules/Scripts
  - from-file: zrun/remove/fedora-cli.yml
  - from-file: zrun/remove/rpm-dnf-extra.yml
  - from-file: zrun/remove/zodium-repos.yml
### => Tweaks Modules/Scripts
  - from-file: zrun/tweak/set-zcore-default.yml
#############################
### End of System Modules ###
#############################
## OS-release Module ##
  - type: os-release
    properties:
      ID: fedora
      NAME: zcore-bootc
      PRETTY_NAME: zcore linux (mesa)
## initramfs module ##
  - type: initramfs
## Signing Module ##
  - type: signing
###################
### END of File ###
###################