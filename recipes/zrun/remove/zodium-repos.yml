---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: dnf
    remove:
      packages:
        - rpmfusion-nonfree-release
        - rpmfusion-free-release
        - rpmfusion-free-release-tainted
        - rpmfusion-nonfree-release-tainted
        - terra-release
        - terra-gpg-keys

  - type: script
    snippets:
      - "dnf5 autoremove -y"
      - "dnf5 clean all"
      - "dnf5 clean packages"