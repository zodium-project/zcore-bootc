# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: dnf
    install:
      install-weak-deps: false
      packages:
       - glibc-all-langpacks
       - langpacks-en
       - langpacks-core-en
       - langpacks-fonts-en

  - type: dnf
    remove:
      packages:
       - glibc-minimal-langpack