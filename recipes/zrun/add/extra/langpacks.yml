---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: dnf
    install:
      install-weak-deps: false
      packages:
       - gawk-all-langpacks
       - glibc-all-langpacks
       
       - langpacks-en
       - langpacks-zh_CN
       - langpacks-hi
       - langpacks-es
       - langpacks-ar
       - langpacks-fr
       - langpacks-pt_BR
       - langpacks-ru
       - langpacks-de
       - langpacks-ja

  - type: dnf
    remove:
      packages:
       - glibc-minimal-langpack