---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:

  - type: dnf
    install:
       install-weak-deps: false
       packages:
          - google-noto-serif-fonts
          - google-noto-sans-cjk-fonts
          - google-noto-sans-arabic-fonts
          - google-noto-sans-hebrew-fonts
          - google-noto-sans-fonts
          - google-noto-color-emoji-fonts

        # - google-noto-serif-vf-fonts (upstream later)
        # - google-noto-sans-cjk-vf-fonts (upstream later)
        # - google-noto-sans-arabic-vf-fonts (upstream later)
        # - google-noto-sans-hebrew-vf-fonts (upstream later)
        # - google-noto-sans-vf-fonts (upstream later)
        # - google-noto-color-emoji-fonts (upstream later)

          - liberation-fonts-all
          - stix-fonts

  - type: fonts
    fonts:
      nerd-fonts:
       - FiraCode
       - Hack