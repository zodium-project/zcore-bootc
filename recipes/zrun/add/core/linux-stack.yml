---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:

 - type: script
   snippets:
      - "dnf upgrade --refresh --setopt=install_weak_deps=False -y"
      - "dnf5 autoremove -y"
      - "dnf5 clean all"
      - "dnf5 clean packages"
      - "dnf upgrade --refresh --setopt=install_weak_deps=False -y"
      
 - type: files
   files:
     - source: secure-boot-der
       destination: /


 - type: dnf
   install:
     install-weak-deps: false
     packages:
      - kernel-tools-libs
      - kernel-modules-extra
      - alsa-ucm
      - alsa-utils
      - libinput
      - systemd-oomd-defaults
      - uresourced
      - lm_sensors
      - dbus-daemon
      - unbound-anchor
      - usbmuxd
      - flatpak
      - distrobox
      - zram-generator
      - thermald
      - upower
      - tuned
      - tuned-ppd
      - gamemode
      - mangohud
      - dnf5-plugins
      - vulkan-tools